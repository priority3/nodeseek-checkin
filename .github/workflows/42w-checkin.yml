name: 42w Daily Check-in

on:
  workflow_dispatch: {}

jobs:
  checkin:
    # 临时暂停 CI 签到；恢复时删除此 if 条件即可。
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run Check-in
        env:
          W42_USER: ${{ secrets.W42_USER }}
          W42_COOKIE: ${{ secrets.W42_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npx tsx 42w-checkin.ts
