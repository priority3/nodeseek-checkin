name: NodeSeek Daily Check-in

on:
  schedule:
    # UTC 时间每天 0:30 执行（即北京时间 8:30）
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - nodeseek
    steps:
      - name: Download repository archive
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workdir="$GITHUB_WORKSPACE"
          tmpdir="$(mktemp -d)"
          archive="$tmpdir/repo.tar.gz"
          trap 'rm -rf "$tmpdir"' EXIT

          # Reason: 这台阿里云 ECS 对 git fetch github.com 很慢，直接下载归档包更稳定。
          curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "$archive"

          mkdir -p "$workdir"
          find "$workdir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$archive" -C "$workdir" --strip-components=1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Xvfb is available
        run: |
          run_cmd() {
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              sudo "$@"
            else
              "$@"
            fi
          }

          if command -v xvfb-run >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            run_cmd apt-get update
            run_cmd apt-get install -y xvfb
          elif command -v dnf >/dev/null 2>&1; then
            run_cmd dnf install -y xorg-x11-server-Xvfb
          elif command -v yum >/dev/null 2>&1; then
            run_cmd yum install -y xorg-x11-server-Xvfb
          else
            echo "xvfb-run is required but no supported package manager was found." >&2
            exit 1
          fi

      - name: Run Check-in
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NS_HEADFUL: '1'
        run: xvfb-run -a npx tsx checkin.ts
