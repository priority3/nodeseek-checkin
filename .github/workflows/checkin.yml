name: NodeSeek Daily Check-in

on:
  schedule:
    # UTC 时间每天 0:30 执行（即北京时间 8:30）
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Xvfb is available
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

      - name: Run Check-in
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NS_HEADFUL: '1'
        run: xvfb-run -a npx tsx checkin.ts
