name: DeepFlood Daily Check-in

on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Download repository archive
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workdir="$GITHUB_WORKSPACE"
          tmpdir="$(mktemp -d)"
          archive="$tmpdir/repo.tar.gz"
          trap 'rm -rf "$tmpdir"' EXIT

          curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "$archive"

          mkdir -p "$workdir"
          find "$workdir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$archive" -C "$workdir" --strip-components=1

      - name: Verify Node.js runtime
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Ensure Xvfb is available
        run: |
          run_cmd() {
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              sudo "$@"
            else
              "$@"
            fi
          }

          if command -v xvfb-run >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            run_cmd apt-get update
            run_cmd apt-get install -y xvfb
          elif command -v dnf >/dev/null 2>&1; then
            run_cmd dnf install -y xorg-x11-server-Xvfb
          elif command -v yum >/dev/null 2>&1; then
            run_cmd yum install -y xorg-x11-server-Xvfb
          else
            echo "xvfb-run is required but no supported package manager was found." >&2
            exit 1
          fi

      - name: Run Check-in
        env:
          DF_COOKIE: ${{ secrets.DF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DF_HEADFUL: '1'
          DF_USER_DATA_DIR: '/tmp/deepflood-browser-profile'
        run: xvfb-run -a npx tsx deepflood-checkin.ts

      - name: Dump Browser Profile On Failure
        if: ${{ failure() }}
        run: |
          echo "=== Browser profile tree ==="
          ls -la /tmp || true
          ls -la /tmp/deepflood-browser-profile || true
