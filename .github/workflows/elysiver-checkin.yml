name: Elysiver Daily Check-in

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch: {}

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
        run: npm ci

      - name: Run Check-in
        env:
          ELYSIVER_USER: ${{ secrets.ELYSIVER_USER }}
          ELYSIVER_SESSION: ${{ secrets.ELYSIVER_SESSION }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npx tsx elysiver-checkin.ts
