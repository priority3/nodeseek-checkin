name: ZenScaleAI Daily Check-in

on:
  workflow_dispatch: {}

jobs:
  checkin:
    # 临时暂停 CI 签到；恢复时删除此 if 条件即可。
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
        run: npm ci

      - name: Run Check-in
        env:
          # Required: user id (New-API-User header value)
          ZENSCALEAI_USER: ${{ secrets.ZENSCALEAI_USER }}
          # Optional: session cookie
          ZENSCALEAI_SESSION: ${{ secrets.ZENSCALEAI_SESSION }}
          # Optional: access token for APIs requiring Bearer auth
          ZENSCALEAI_ACCESS_TOKEN: ${{ secrets.ZENSCALEAI_ACCESS_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npx tsx zenscaleai-checkin.ts
